<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify Manager</title>
  </head>
  <body>
    <noscript><p>JavaScript is required. <a href="./src/renderer/">Open Spotify Manager</a>.</p></noscript>
    <script>
      const target = new URL('./src/renderer/', window.location.href);
      target.search = window.location.search || '';
      target.hash = window.location.hash || '';
      window.location.replace(target.toString());
    </script>
  </body>
</html>
